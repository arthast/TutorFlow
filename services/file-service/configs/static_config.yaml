# file-service — полный статический конфиг.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8085
                task_processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        file-db:
            dbconnection#env: FILE_DATABASE_URL
            blocking_task_processor: fs-task-processor
        file-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
            environment-secrets-key: FILE_SECDIST_CONFIG
        file-storage:
            backend#env: FILE_STORAGE_BACKEND
            storage-dir#env: FILE_STORAGE_DIR
            timeout-ms: 5000
        file-domain-service:
            max-size-bytes#env: FILE_MAX_SIZE_BYTES
        file-upload-handler:
            path: /internal/files
            method: POST
            task_processor: main-task-processor
        file-get-meta-handler:
            path: /internal/files/{fileId}
            method: GET
            task_processor: main-task-processor
        file-download-handler:
            path: /internal/files/{fileId}/download
            method: GET
            task_processor: main-task-processor
