# assignment-service — ДЗ, решения, комментарии.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
        producer-task-processor:
            thread_name: kafka-prod
            worker_threads: 1
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8083
                task_processor: main-task-processor
            listener-monitor:
                port: 18083
                task_processor: main-task-processor
        grpc-server:
            port: 9083
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        ready-handler:
            path: /ready
            method: GET
            task_processor: main-task-processor
        handler-server-monitor:
            path: /metrics
            method: GET
            task_processor: main-task-processor
            format: prometheus
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        assignment-db:
            dbconnection#env: ASSIGNMENT_DATABASE_URL
            blocking_task_processor: fs-task-processor
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
            environment-secrets-key: KAFKA_SECDIST_CONFIG
        kafka-producer:
            security_protocol: PLAINTEXT
            enable_idempotence: true
            delivery_timeout: 5s
            queue_buffering_max: 100ms
        assignment-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        assignment-domain-service: {}
        assignment-grpc-service:
            task-processor: main-task-processor
        assignment-outbox-publisher: {}
        assignment-deadline-worker:
            # Интервал тика. Дефолт 60s; в dev/тестах задаётся короткий через
            # ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS (docker-compose).
            period-ms#env: ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS
            period-ms#fallback: 60000
