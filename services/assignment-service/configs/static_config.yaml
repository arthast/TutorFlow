# assignment-service — ДЗ, решения, комментарии.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8083
                task_processor: main-task-processor
        grpc-server:
            port: 9083
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        assignment-db:
            dbconnection#env: ASSIGNMENT_DATABASE_URL
            blocking_task_processor: fs-task-processor
        assignment-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        assignment-domain-service: {}
        assignment-create-handler:
            path: /internal/assignments
            method: POST
            task_processor: main-task-processor
        assignment-list-handler:
            path: /internal/assignments
            method: GET
            task_processor: main-task-processor
        assignment-get-handler:
            path: /internal/assignments/{assignmentId}
            method: GET
            task_processor: main-task-processor
        assignment-submit-handler:
            path: /internal/assignments/{assignmentId}/submit
            method: POST
            task_processor: main-task-processor
        assignment-review-handler:
            path: /internal/assignments/{assignmentId}/review
            method: POST
            task_processor: main-task-processor
        assignment-comment-handler:
            path: /internal/assignments/{assignmentId}/comments
            method: POST
            task_processor: main-task-processor
