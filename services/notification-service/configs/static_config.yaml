# notification-service — in-app notifications from Kafka events.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
        consumer-task-processor:
            thread_name: kafka-cons
            worker_threads: 1
        consumer-blocking-task-processor:
            thread_name: kafka-cblk
            worker_threads: 1
        producer-task-processor:
            thread_name: kafka-prod
            worker_threads: 1
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8086
                task_processor: main-task-processor
        grpc-server:
            port: 9086
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        ready-handler:
            path: /ready
            method: GET
            task_processor: main-task-processor
        testsuite-support: {}
        dns-client: {}
        notification-db:
            dbconnection#env: NOTIFICATION_DATABASE_URL
            blocking_task_processor: fs-task-processor
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
        kafka-consumer:
            group_id: notification-domain-events
            topics:
              - tutorflow.assignment.created
              - tutorflow.submission.uploaded
              - tutorflow.assignment.reviewed
              - tutorflow.assignment.deadline_expired
              - tutorflow.payment_receipt.uploaded
              - tutorflow.payment.confirmed
              - tutorflow.payment.rejected
              - tutorflow.lesson.completed
              - tutorflow.lesson.rescheduled
              - tutorflow.lesson.scheduled
              - tutorflow.lesson.cancelled
              - tutorflow.lesson.restored
              - tutorflow.balance.changed
              - tutorflow.message.sent
            # Топики создаются лениво (auto-create на первый publish); частый
            # refresh подхватывает свежий топик без задержки (как в finance, 5L.4).
            topic_metadata_refresh_interval: 3s
            auto_offset_reset: smallest
            max_batch_size: 1
            security_protocol: PLAINTEXT
        kafka-producer:
            security_protocol: PLAINTEXT
            enable_idempotence: true
            delivery_timeout: 5s
            queue_buffering_max: 100ms
        notification-repository: {}
        notification-domain-service: {}
        notification-grpc-service:
            task-processor: main-task-processor
        notification-domain-event-consumer: {}
        notification-outbox-publisher: {}
