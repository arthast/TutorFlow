# api-gateway — единственная публичная точка входа.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8080
                task_processor: main-task-processor
            listener-monitor:
                port: 18080
                task_processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET,OPTIONS
            task_processor: main-task-processor
        ready-handler:
            path: /ready
            method: GET
            task_processor: main-task-processor
        handler-server-monitor:
            path: /metrics
            method: GET
            task_processor: main-task-processor
            format: prometheus
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        gateway-identity-grpc-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        gateway-lesson-grpc-client:
            endpoint: dns:///lesson-service:9082
            timeout-ms: 5000
        gateway-assignment-grpc-client:
            endpoint: dns:///assignment-service:9083
            timeout-ms: 5000
        gateway-finance-grpc-client:
            endpoint: dns:///finance-service:9084
            timeout-ms: 5000
        gateway-notification-grpc-client:
            endpoint: dns:///notification-service:9086
            timeout-ms: 5000
        gateway-report-grpc-client:
            endpoint: dns:///report-service:9087
            timeout-ms: 5000
        gateway-chat-grpc-client:
            endpoint: dns:///chat-service:9088
            timeout-ms: 5000
        gateway-settings:
            jwt-secret#env: JWT_SECRET
            cors-origin#env: GATEWAY_CORS_ORIGIN
            file-base-url#env: FILE_SERVICE_URL
            timeout-ms: 5000
        gateway-auth-register-handler:
            path: /auth/register
            method: POST,OPTIONS
            task_processor: main-task-processor
        gateway-auth-login-handler:
            path: /auth/login
            method: POST,OPTIONS
            task_processor: main-task-processor
        gateway-auth-change-password-handler:
            path: /auth/change-password
            method: POST,OPTIONS
            task_processor: main-task-processor
        gateway-me-handler:
            path: /me
            method: GET,OPTIONS
            task_processor: main-task-processor
        gateway-students-handler:
            path: /students
            method: GET,POST,OPTIONS
            task_processor: main-task-processor
        gateway-student-handler:
            path: /students/{studentId}
            method: GET,OPTIONS
            task_processor: main-task-processor
        gateway-student-balance-handler:
            path: /students/{studentId}/balance
