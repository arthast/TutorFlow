# chat-service — личная переписка teacher<->student (gRPC) + outbox-producer.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
        producer-task-processor:
            thread_name: kafka-prod
            worker_threads: 1
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8088
                task_processor: main-task-processor
        grpc-server:
            port: 9088
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        ready-handler:
            path: /ready
            method: GET
            task_processor: main-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        chat-db:
            dbconnection#env: CHAT_DATABASE_URL
            blocking_task_processor: fs-task-processor
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
        kafka-producer:
            security_protocol: PLAINTEXT
            enable_idempotence: true
            delivery_timeout: 5s
            queue_buffering_max: 100ms
        chat-repository: {}
        chat-domain-service: {}
        chat-grpc-service:
            task-processor: main-task-processor
        chat-outbox-publisher: {}
