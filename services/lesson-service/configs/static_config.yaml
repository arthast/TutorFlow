# lesson-service — расписание + занятия.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
        producer-task-processor:
            thread_name: kafka-prod
            worker_threads: 1
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8082
                task_processor: main-task-processor
        grpc-server:
            port: 9082
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        lesson-db:
            dbconnection#env: LESSON_DATABASE_URL
            blocking_task_processor: fs-task-processor
        lesson-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        finance-client:
            base-url#env: FINANCE_SERVICE_URL
            timeout-ms: 5000
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
        kafka-producer:
            security_protocol: PLAINTEXT
            enable_idempotence: true
            delivery_timeout: 5s
            queue_buffering_max: 100ms
        lesson-domain-service: {}
        lesson-grpc-service:
            task-processor: main-task-processor
        # Transactional outbox publisher (5E-1): poll pending -> Kafka.
        lesson-outbox-publisher: {}
