# finance-service — append-only журнал операций + чеки.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8084
                task_processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        dns-client: {}
        testsuite-support: {}
        finance-db:
            dbconnection#env: FINANCE_DATABASE_URL
            blocking_task_processor: fs-task-processor
        finance-repository: {}
        identity-client:
            base-url#env: IDENTITY_SERVICE_URL
            timeout-ms: 5000
        finance-domain-service: {}
        finance-create-charge-handler:
            path: /internal/charges
            method: POST
            task_processor: main-task-processor
        finance-get-balance-handler:
            path: /internal/students/{studentId}/balance
            method: GET
            task_processor: main-task-processor
        finance-list-transactions-handler:
            path: /internal/students/{studentId}/transactions
            method: GET
            task_processor: main-task-processor
        finance-create-receipt-handler:
            path: /internal/payment-receipts
            method: POST
            task_processor: main-task-processor
        finance-list-receipts-handler:
            path: /internal/payment-receipts
            method: GET
            task_processor: main-task-processor
        finance-confirm-receipt-handler:
            path: /internal/payment-receipts/{receiptId}/confirm
            method: POST
            task_processor: main-task-processor
        finance-reject-receipt-handler:
            path: /internal/payment-receipts/{receiptId}/reject
            method: POST
            task_processor: main-task-processor
