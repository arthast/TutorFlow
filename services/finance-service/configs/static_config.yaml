# finance-service — append-only журнал операций + чеки.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
        consumer-task-processor:
            thread_name: kafka-cons
            worker_threads: 1
        consumer-blocking-task-processor:
            thread_name: kafka-cblk
            worker_threads: 1
        producer-task-processor:
            thread_name: kafka-prod
            worker_threads: 1
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8084
                task_processor: main-task-processor
        grpc-server:
            port: 9084
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        finance-db:
            dbconnection#env: FINANCE_DATABASE_URL
            blocking_task_processor: fs-task-processor
        finance-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        secdist:
            provider: default-secdist-provider
        default-secdist-provider:
            config: /app/configs/secdist.json
        kafka-producer:
            security_protocol: PLAINTEXT
            enable_idempotence: true
            delivery_timeout: 5s
            queue_buffering_max: 100ms
        kafka-consumer:
            group_id: finance-lesson-completed
            topics:
              - tutorflow.lesson.completed
              - tutorflow.lesson.cancelled
              - tutorflow.lesson.restored
            # Топики создаются лениво (auto-create на первый publish). С дефолтным
            # refresh (5 мин) консьюмер не подхватывает только что созданный
            # tutorflow.lesson.cancelled вовремя -> компенсация задерживается.
            # Частый refresh подхватывает новый топик за пару секунд.
            topic_metadata_refresh_interval: 3s
            auto_offset_reset: smallest
            max_batch_size: 1
            security_protocol: PLAINTEXT
        finance-domain-service: {}
        finance-grpc-service:
            task-processor: main-task-processor
        # Kafka consumer (5E-2): the only charge creation path.
        finance-lesson-completed-consumer: {}
        finance-outbox-publisher: {}
