# finance-service — append-only журнал операций + чеки.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8084
                task_processor: main-task-processor
        grpc-server:
            port: 9084
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        grpc-client-common:
            blocking-task-processor: fs-task-processor
        grpc-client-middlewares-pipeline: {}
        grpc-client-logging: {}
        grpc-client-factory: {}
        dns-client: {}
        testsuite-support: {}
        finance-db:
            dbconnection#env: FINANCE_DATABASE_URL
            blocking_task_processor: fs-task-processor
        finance-repository: {}
        identity-client:
            endpoint: dns:///identity-service:9081
            timeout-ms: 5000
        finance-domain-service: {}
        finance-grpc-service:
            task-processor: main-task-processor
        # NOT deprecated: lesson->finance charge stays internal REST until 5E
        # (Kafka). gateway never calls this endpoint.
        finance-create-charge-handler:
            path: /internal/charges
            method: POST
            task_processor: main-task-processor
