# identity-service — полный статический конфиг.
components_manager:
    task_processors:
        main-task-processor:
            worker_threads: 4
        fs-task-processor:
            worker_threads: 2
    default_task_processor: main-task-processor
    components:
        server:
            listener:
                port: 8081
                task_processor: main-task-processor
        grpc-server:
            port: 9081
            completion-queue-count: 2
        grpc-health:
            task-processor: main-task-processor
        logging:
            loggers:
                default:
                    file_path: '@stderr'
                    level: info
                    overflow_behavior: discard
        health-handler:
            path: /health
            method: GET
            task_processor: main-task-processor
        ready-handler:
            path: /ready
            method: GET
            task_processor: main-task-processor
        http-client: {}
        http-client-core:
            fs-task-processor: fs-task-processor
        dns-client: {}
        testsuite-support: {}
        identity-db:
            dbconnection#env: IDENTITY_DATABASE_URL
            blocking_task_processor: fs-task-processor
        identity-repository: {}
        identity-domain-service:
            jwt-secret#env: JWT_SECRET
            jwt-expires-in-seconds: 86400
        identity-grpc-service:
            task-processor: main-task-processor
