openapi: 3.0.3
info:
  title: TutorFlow file-service (internal)
  version: 0.1.0
  description: >
    Загрузка/выдача файлов. MVP: бинарь в локальном volume (FILE_STORAGE_DIR),
    в БД только метаданные. Проверка доступа на скачивание. Owner: Agent A.
    Не выставляется наружу. Вызовы от gateway с X-User-Id / X-User-Roles.
servers:
  - url: http://file-service:8085
    description: docker network

paths:
  /health:
    get:
      summary: Health
      responses: { "200": { $ref: "#/components/responses/Health" } }

  /internal/files:
    post:
      summary: Загрузить файл (multipart). Возвращает file_id + метаданные.
      parameters: [ { $ref: "#/components/parameters/XUserId" } ]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, purpose]
              properties:
                file: { type: string, format: binary }
                purpose: { type: string, enum: [assignment_attachment, submission_file, payment_receipt, lesson_material] }
                resource_id: { type: string, format: uuid, nullable: true }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/FileMeta" } } } }
        "413": { $ref: "#/components/responses/Error", description: too large (FILE_MAX_SIZE_BYTES) }
        "415": { $ref: "#/components/responses/Error", description: unsupported content-type }

  /internal/files/{fileId}:
    get:
      summary: Метаданные файла
      parameters:
        - { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/XUserId" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/FileMeta" } } } }
        "404": { $ref: "#/components/responses/Error" }

  /internal/files/{fileId}/download:
    get:
      summary: >
        Скачать файл. Доступ: владелец (owner_user_id == X-User-Id) ИЛИ teacher,
        связанный с владельцем-учеником (проверка через identity check-access). Иначе 403.
      parameters:
        - { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
        - { $ref: "#/components/parameters/XUserId" }
        - { $ref: "#/components/parameters/XUserRoles" }
      responses:
        "200": { description: binary, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

components:
  parameters:
    XUserId: { name: X-User-Id, in: header, required: true, schema: { type: string, format: uuid } }
    XUserRoles: { name: X-User-Roles, in: header, required: true, schema: { type: string } }
  responses:
    Health:
      description: ok
      content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } }
    Error:
      description: единый формат ошибки
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object, additionalProperties: true }
    FileMeta:
      type: object
      properties:
        id: { type: string, format: uuid }
        owner_user_id: { type: string, format: uuid }
        purpose: { type: string, enum: [assignment_attachment, submission_file, payment_receipt, lesson_material] }
        original_name: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer }
        created_at: { type: string, format: date-time }
