openapi: 3.0.3
info:
  title: TutorFlow api-gateway (external public API)
  version: 0.1.0
  description: >
    Единственная точка входа для клиентов. Валидирует JWT, срезает входящие
    X-User-* и проставляет их заново, маршрутизирует во внутренние сервисы.
    Бизнес-логики не содержит. Источник правды по домену — docs/PLAN.md.
servers:
  - url: http://localhost:8080
    description: dev

security:
  - bearerAuth: []

paths:
  /health:
    get:
      summary: Health check
      security: []
      responses:
        "200": { $ref: "#/components/responses/Health" }

  # ---------- Auth ----------
  /auth/register:
    post:
      summary: Регистрация (teacher или student)
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/RegisterRequest" }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } }
        "409": { $ref: "#/components/responses/Error" }
        "400": { $ref: "#/components/responses/Error" }

  /auth/login:
    post:
      summary: Логин
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/LoginRequest" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TokenResponse" } } } }
        "401": { $ref: "#/components/responses/Error" }

  /auth/change-password:
    post:
      summary: Сменить пароль текущего пользователя (нужен Bearer-токен)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ChangePasswordRequest" }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } } }
        "400": { $ref: "#/components/responses/Error" }
        "401": { $ref: "#/components/responses/Error" }

  /me:
    get:
      summary: Текущий пользователь
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Me" } } } }
        "401": { $ref: "#/components/responses/Error" }

  # ---------- Students (teacher) ----------
  /students:
    post:
      summary: Создать ученика и связь teacher-student (teacher)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateStudentRequest" }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/StudentLink" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    get:
      summary: Список учеников преподавателя (teacher)
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/StudentLink" } } } } }
  /students/{studentId}:
    get:
      summary: Карточка ученика
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/StudentLink" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /students/{studentId}/balance:
    get:
      summary: Баланс/долг ученика
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Balance" } } } }
  /students/{studentId}/transactions:
    get:
      summary: Финансовые операции по ученику
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Transaction" } } } } }
  /students/{studentId}/corrections:
    post:
      summary: Ручная корректировка баланса ученика (teacher)
      description: >-
        Преподаватель добавляет корректирующую операцию correction (±amount) для
        ученика. append-only: предыдущие операции не меняются. Доступ — только
        преподавателю этого ученика (identity check-access). Эмитит balance.changed.
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateCorrectionRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }

  # ---------- Availability + Lessons ----------
  /availability:
    post:
      summary: Создать слот доступности (teacher)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateSlotRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Slot" } } } }
    get:
      summary: Слоты доступности
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Slot" } } } } }

  /lessons:
    post:
      summary: Создать занятие (teacher)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateLessonRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Lesson" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
    get:
      summary: Список занятий (teacher видит свои, student — свои)
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Lesson" } } } } }
  /lessons/{lessonId}:
    get:
      summary: Занятие
      parameters: [ { $ref: "#/components/parameters/LessonId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Lesson" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /lessons/{lessonId}/complete:
    post:
      summary: >-
        Отметить занятие проведённым (teacher). Charge создаётся АСИНХРОННО:
        lesson публикует событие lesson.completed (outbox→Kafka), finance создаёт
        charge идемпотентно по lesson_id. Баланс обновляется eventual — клиент
        дообновляет его отдельным запросом. Ответ несёт charge_status:"pending".
      parameters: [ { $ref: "#/components/parameters/LessonId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/CompleteLessonResponse" } } } }
        "409": { $ref: "#/components/responses/Error" }
  /lessons/{lessonId}/reschedule:
    post:
      summary: Перенести запланированное занятие (teacher)
      description: >-
        Разрешено только для status=scheduled. Если new_slot_id передан, слот
        должен принадлежать teacher и быть open; старый слот освобождается.
      parameters: [ { $ref: "#/components/parameters/LessonId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/RescheduleLessonRequest" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Lesson" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /lessons/{lessonId}/reactivate:
    post:
      summary: Восстановить отменённое занятие (teacher)
      description: >-
        Разрешено только для status=cancelled. Время занятия не меняется. Если
        у занятия есть slot_id, слот должен быть open и будет заново booked.
        Повтор для уже scheduled занятия идемпотентно возвращает текущий Lesson.
      parameters: [ { $ref: "#/components/parameters/LessonId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Lesson" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
  /lessons/{lessonId}/cancel:
    post:
      summary: Отменить занятие (teacher)
      description: >-
        Допускается отмена как scheduled, так и completed занятия (5L.3).
        При отмене completed занятия lesson публикует lesson.cancelled с
        previous_status=completed и price; finance АСИНХРОННО добавляет
        компенсирующую correction (−price) идемпотентно по lesson_id (charge
        не удаляется — append-only), баланс возвращается eventual. Повтор для
        уже cancelled занятия идемпотентно возвращает текущий Lesson.
      parameters: [ { $ref: "#/components/parameters/LessonId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Lesson" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  # ---------- Assignments ----------
  /assignments:
    post:
      summary: Создать ДЗ (teacher)
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateAssignmentRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Assignment" } } } }
        "403": { $ref: "#/components/responses/Error" }
    get:
      summary: Список ДЗ
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Assignment" } } } } }
  /assignments/{assignmentId}:
    get:
      summary: ДЗ с решениями и комментариями
      parameters: [ { $ref: "#/components/parameters/AssignmentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/AssignmentDetail" } } } }
        "404": { $ref: "#/components/responses/Error" }
  /assignments/{assignmentId}/submit:
    post:
      summary: Отправить решение (student)
      parameters: [ { $ref: "#/components/parameters/AssignmentId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/SubmitRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Submission" } } } }
  /assignments/{assignmentId}/review:
    post:
      summary: Проверить решение (teacher)
      parameters: [ { $ref: "#/components/parameters/AssignmentId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/ReviewRequest" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Submission" } } } }
  /assignments/{assignmentId}/comments:
    post:
      summary: Оставить комментарий
      parameters: [ { $ref: "#/components/parameters/AssignmentId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CommentRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Comment" } } } }

  # ---------- Payments ----------
  /payments/receipts:
    get:
      summary: Список чеков (teacher — на проверку; student — свои). Скоуп по X-User-Id.
      parameters:
        - { name: status, in: query, required: false, schema: { type: string, enum: [pending_review, confirmed, rejected] } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Receipt" } } } } }
    post:
      summary: Загрузить чек оплаты (student). Баланс НЕ меняется до подтверждения.
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateReceiptRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }
  /payments/receipts/{receiptId}/confirm:
    post:
      summary: Подтвердить чек (teacher). Создаёт payment, меняет баланс.
      parameters: [ { $ref: "#/components/parameters/ReceiptId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }
        "409": { $ref: "#/components/responses/Error" }
  /payments/receipts/{receiptId}/reject:
    post:
      summary: Отклонить чек (teacher). Идемпотентно; reject уже confirmed чека → 409.
      parameters: [ { $ref: "#/components/parameters/ReceiptId" } ]
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/RejectRequest" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }
        "409": { $ref: "#/components/responses/Error" }

  # ---------- Notifications ----------
  /notifications:
    get:
      summary: Список уведомлений текущего пользователя
      parameters:
        - { name: unread_only, in: query, required: false, schema: { type: boolean, default: false } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Notification" } } } } }
        "401": { $ref: "#/components/responses/Error" }
  /notifications/{notificationId}/read:
    post:
      summary: Пометить уведомление текущего пользователя прочитанным
      parameters: [ { $ref: "#/components/parameters/NotificationId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Notification" } } } }
        "401": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  # ---------- Dashboards / reports ----------
  /dashboard/teacher:
    get:
      summary: Dashboard преподавателя из report read-model
      description: >-
        Агрегаты строятся report-service из Kafka events. Имена учеников
        подтягиваются gateway из identity по gRPC на чтении.
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/TeacherDashboard" } } } }
        "403": { $ref: "#/components/responses/Error" }
  /dashboard/student:
    get:
      summary: Dashboard текущего ученика из report read-model
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/StudentDashboard" } } } }
        "403": { $ref: "#/components/responses/Error" }
  /students/{studentId}/summary:
    get:
      summary: Сводка по ученику для преподавателя из report read-model
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/StudentSummary" } } } }
        "403": { $ref: "#/components/responses/Error" }

  # ---------- Files ----------
  /files:
    post:
      summary: Загрузить файл (multipart). Возвращает file_id.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file: { type: string, format: binary }
                purpose: { type: string, enum: [assignment_attachment, submission_file, payment_receipt, lesson_material, chat_message] }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/FileMeta" } } } }
        "413": { $ref: "#/components/responses/Error" }
        "415": { $ref: "#/components/responses/Error" }
  /files/{fileId}:
    get:
      summary: Метаданные файла
      parameters: [ { $ref: "#/components/parameters/FileId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/FileMeta" } } } }
        "403": { $ref: "#/components/responses/Error" }
  /files/{fileId}/download:
    get:
      summary: Скачать файл (проверка доступа)
      parameters: [ { $ref: "#/components/parameters/FileId" } ]
      responses:
        "200": { description: binary, content: { application/octet-stream: { schema: { type: string, format: binary } } } }
        "403": { $ref: "#/components/responses/Error" }

  # ---------- Chat (5J) ----------
  /chats:
    get:
      summary: Список диалогов звонящего (+ last_message, unread_count)
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Dialog" } } } } }
    post:
      summary: Создать (или найти) диалог с собеседником. Идемпотентно по паре.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [other_user_id]
              properties:
                other_user_id: { type: string, format: uuid }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Dialog" } } } }
        "403": { $ref: "#/components/responses/Error" }
  /chats/{dialogId}/messages:
    get:
      summary: Сообщения диалога (пагинация назад через before)
      parameters:
        - { $ref: "#/components/parameters/DialogId" }
        - { name: before, in: query, required: false, schema: { type: string, format: uuid } }
        - { name: limit, in: query, required: false, schema: { type: integer } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Message" } } } } }
        "403": { $ref: "#/components/responses/Error" }
    post:
      summary: Отправить сообщение (text + опц. file_ids)
      parameters: [ { $ref: "#/components/parameters/DialogId" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                text: { type: string }
                file_ids: { type: array, items: { type: string, format: uuid } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Message" } } } }
        "403": { $ref: "#/components/responses/Error" }
  /chats/{dialogId}/read:
    post:
      summary: Отметить прочитанным до up_to_message_id (только вперёд)
      parameters: [ { $ref: "#/components/parameters/DialogId" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [up_to_message_id]
              properties:
                up_to_message_id: { type: string, format: uuid }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/ReadMarker" } } } }
        "403": { $ref: "#/components/responses/Error" }

components:
  securitySchemes:
    bearerAuth: { type: http, scheme: bearer, bearerFormat: JWT }
  parameters:
    StudentId: { name: studentId, in: path, required: true, schema: { type: string, format: uuid } }
    LessonId: { name: lessonId, in: path, required: true, schema: { type: string, format: uuid } }
    AssignmentId: { name: assignmentId, in: path, required: true, schema: { type: string, format: uuid } }
    ReceiptId: { name: receiptId, in: path, required: true, schema: { type: string, format: uuid } }
    FileId: { name: fileId, in: path, required: true, schema: { type: string, format: uuid } }
    NotificationId: { name: notificationId, in: path, required: true, schema: { type: string, format: uuid } }
    DialogId: { name: dialogId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    Health:
      description: ok
      content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } }
    Error:
      description: Единый формат ошибки
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code: { type: string, example: validation_error }
            message: { type: string }
            details: { type: object, additionalProperties: true }
    RegisterRequest:
      type: object
      required: [email, password, role, display_name]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        role: { type: string, enum: [teacher, student] }
        display_name: { type: string }
        timezone: { type: string, nullable: true }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    TokenResponse:
      type: object
      properties:
        access_token: { type: string }
        token_type: { type: string, example: Bearer }
        expires_in: { type: integer }
    Me:
      type: object
      properties:
        user_id: { type: string, format: uuid }
        email: { type: string }
        roles: { type: array, items: { type: string } }
        display_name: { type: string }
    CreateStudentRequest:
      type: object
      required: [display_name, email, password]
      properties:
        email: { type: string, format: email, description: "реальная почта ученика" }
        password: { type: string, minLength: 8, description: "временный пароль (ученик сменит после входа)" }
        display_name: { type: string }
        subject: { type: string }
        goal: { type: string }
        hourly_rate: { type: number }
    ChangePasswordRequest:
      type: object
      required: [current_password, new_password]
      properties:
        current_password: { type: string }
        new_password: { type: string, minLength: 8 }
    StudentLink:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        display_name: { type: string }
        subject: { type: string }
        goal: { type: string }
        hourly_rate: { type: number }
        status: { type: string, enum: [invited, active, archived] }
    Balance:
      type: object
      properties:
        student_id: { type: string, format: uuid }
        currency: { type: string, example: RUB }
        balance: { type: number, description: "положительный = долг ученика" }
    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        type: { type: string, enum: [charge, payment, correction, refund] }
        amount: { type: number }
        currency: { type: string }
        lesson_id: { type: string, format: uuid, nullable: true }
        receipt_id: { type: string, format: uuid, nullable: true }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    CreateCorrectionRequest:
      type: object
      required: [amount, comment]
      properties:
        amount: { type: number, description: "± знак задаёт направление коррекции; 0 запрещён (422)" }
        currency: { type: string, description: "дефолт RUB" }
        comment: { type: string, description: "обязателен — причина коррекции" }
    CreateSlotRequest:
      type: object
      required: [starts_at, ends_at]
      properties:
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
    Slot:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        status: { type: string, enum: [open, booked] }
    CreateLessonRequest:
      type: object
      required: [student_id, starts_at, ends_at]
      properties:
        student_id: { type: string, format: uuid }
        slot_id: { type: string, format: uuid, nullable: true }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        topic: { type: string }
        price: { type: number, description: "если не задано — берётся из hourly_rate связи" }
        file_ids: { type: array, items: { type: string, format: uuid }, description: "материалы урока (lesson_material)" }
    RescheduleLessonRequest:
      type: object
      required: [new_starts_at, new_ends_at]
      properties:
        new_starts_at: { type: string, format: date-time }
        new_ends_at: { type: string, format: date-time }
        new_slot_id: { type: string, format: uuid, nullable: true }
    Lesson:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        starts_at: { type: string, format: date-time }
        ends_at: { type: string, format: date-time }
        status: { type: string, enum: [scheduled, completed, cancelled] }
        topic: { type: string }
        notes: { type: string, nullable: true }
        price: { type: number }
        file_ids: { type: array, items: { type: string, format: uuid } }
        completed_at: { type: string, format: date-time, nullable: true }
    CompleteLessonResponse:
      type: object
      description: >-
        Результат complete. Charge создаётся асинхронно, поэтому сразу после
        ответа charge ещё может не существовать (charge_status:"pending").
      properties:
        lesson: { $ref: "#/components/schemas/Lesson" }
        charge_status:
          type: string
          enum: [pending, created]
          description: >-
            pending — событие lesson.completed опубликовано, charge будет создан
            consumer'ом finance; created — charge уже существует (идемпотентно).
      required: [lesson, charge_status]
    CreateAssignmentRequest:
      type: object
      required: [student_id, title]
      properties:
        student_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        due_at: { type: string, format: date-time, nullable: true }
        file_ids: { type: array, items: { type: string, format: uuid } }
    Assignment:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        title: { type: string }
        description: { type: string }
        due_at: { type: string, format: date-time, nullable: true }
        status: { type: string, enum: [assigned, submitted, reviewed, needs_fix, done, expired] }
        created_at: { type: string, format: date-time }
    AssignmentDetail:
      allOf:
        - $ref: "#/components/schemas/Assignment"
        - type: object
          properties:
            submissions: { type: array, items: { $ref: "#/components/schemas/Submission" } }
            comments: { type: array, items: { $ref: "#/components/schemas/Comment" } }
            file_ids: { type: array, items: { type: string, format: uuid } }
    SubmitRequest:
      type: object
      properties:
        text_answer: { type: string }
        file_ids: { type: array, items: { type: string, format: uuid } }
    Submission:
      type: object
      properties:
        id: { type: string, format: uuid }
        assignment_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        text_answer: { type: string }
        status: { type: string, enum: [submitted, reviewed, needs_fix, accepted] }
        submitted_at: { type: string, format: date-time }
        file_ids: { type: array, items: { type: string, format: uuid } }
    ReviewRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [reviewed, needs_fix, accepted] }
        comment: { type: string }
    CommentRequest:
      type: object
      required: [text]
      properties:
        text: { type: string }
    Comment:
      type: object
      properties:
        id: { type: string, format: uuid }
        assignment_id: { type: string, format: uuid }
        author_id: { type: string, format: uuid }
        text: { type: string }
        created_at: { type: string, format: date-time }
    CreateReceiptRequest:
      # student_id не передаётся клиентом — берётся из аутентификации (X-User-Id).
      type: object
      required: [teacher_id, file_id, amount]
      properties:
        teacher_id: { type: string, format: uuid, description: "кому из преподавателей платит ученик" }
        file_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string, default: RUB }
        comment: { type: string }
    Receipt:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        file_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string }
        status: { type: string, enum: [pending_review, confirmed, rejected] }
        submitted_at: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time, nullable: true }
    RejectRequest:
      type: object
      properties:
        comment: { type: string }
    Notification:
      type: object
      properties:
        id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        type:
          type: string
          enum:
            - assignment_created
            - submission_uploaded
            - assignment_reviewed
            - payment_receipt_uploaded
            - payment_confirmed
            - payment_rejected
            - lesson_completed
        title: { type: string }
        body: { type: string }
        payload: { type: object, additionalProperties: true }
        is_read: { type: boolean }
        created_at: { type: string, format: date-time }
    FinanceSummary:
      type: object
      properties:
        balance_amount: { type: number, description: "signed абсолютный баланс: >0 долг, <0 переплата" }
        debt_amount: { type: number }
        overpaid_amount: { type: number }
        currency: { type: string, example: RUB }
        pending_receipts_count: { type: integer }
        pending_receipts_amount: { type: number }
        last_payment_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ActivitySummary:
      type: object
      properties:
        upcoming_lessons_count: { type: integer }
        completed_lessons_count: { type: integer }
        cancelled_lessons_count: { type: integer }
        active_assignments_count: { type: integer }
        submitted_assignments_count: { type: integer }
        reviewed_assignments_count: { type: integer }
        last_lesson_at: { type: string, format: date-time }
        next_lesson_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    StudentSummary:
      type: object
      properties:
        teacher_id: { type: string, format: uuid }
        teacher_name: { type: string, description: "Имя преподавателя, добавляется gateway для student dashboard" }
        student_id: { type: string, format: uuid }
        student_name: { type: string }
        finance: { $ref: "#/components/schemas/FinanceSummary" }
        activity: { $ref: "#/components/schemas/ActivitySummary" }
        updated_at: { type: string, format: date-time }
    TeacherDashboard:
      type: object
      properties:
        teacher_id: { type: string, format: uuid }
        students_count: { type: integer }
        upcoming_lessons_count: { type: integer }
        pending_submissions_count: { type: integer }
        pending_receipts_count: { type: integer }
        pending_receipts_amount: { type: number }
        total_debt_amount: { type: number, description: "Σ debt_amount, не signed balance" }
        total_overpaid_amount: { type: number }
        students_with_debt_count: { type: integer }
        students: { type: array, items: { $ref: "#/components/schemas/StudentSummary" } }
        updated_at: { type: string, format: date-time }
    StudentDashboard:
      type: object
      properties:
        student_id: { type: string, format: uuid }
        total_debt_amount: { type: number }
        total_overpaid_amount: { type: number }
        pending_receipts_count: { type: integer }
        pending_receipts_amount: { type: number }
        summaries: { type: array, items: { $ref: "#/components/schemas/StudentSummary" } }
        updated_at: { type: string, format: date-time }
    FileMeta:
      type: object
      properties:
        id: { type: string, format: uuid }
        owner_user_id: { type: string, format: uuid }
        purpose: { type: string, enum: [assignment_attachment, submission_file, payment_receipt, lesson_material, chat_message] }
        original_name: { type: string }
        content_type: { type: string }
        size_bytes: { type: integer }
        created_at: { type: string, format: date-time }
    Message:
      type: object
      properties:
        id: { type: string, format: uuid }
        dialog_id: { type: string, format: uuid }
        sender_id: { type: string, format: uuid }
        text: { type: string }
        file_ids: { type: array, items: { type: string, format: uuid } }
        created_at: { type: string, format: date-time }
    Dialog:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        created_at: { type: string, format: date-time }
        last_message_at: { type: string, format: date-time, nullable: true }
        unread_count: { type: integer }
        last_message: { allOf: [ { $ref: "#/components/schemas/Message" } ], nullable: true }
    ReadMarker:
      type: object
      properties:
        dialog_id: { type: string, format: uuid }
        user_id: { type: string, format: uuid }
        last_read_message_id: { type: string, format: uuid }
        last_read_at: { type: string, format: date-time }
