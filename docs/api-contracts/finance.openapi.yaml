openapi: 3.0.3
info:
  title: TutorFlow finance-service (internal)
  version: 0.1.0
  description: >
    Финансовый учёт. Реальных платежей нет. Модель — append-only журнал
    (financial_transactions) + payment_receipts. Баланс = сумма со знаками.
    Charge приходит от lesson-service (unique по lesson_id). Баланс меняется только
    после подтверждения чека teacher. Owner: Agent B. Вызовы от gateway с X-User-*.
servers:
  - url: http://finance-service:8084
    description: docker network

paths:
  /health:
    get: { summary: Health, responses: { "200": { $ref: "#/components/responses/Health" } } }

  /internal/charges:
    post:
      summary: >
        Создать начисление за проведённое занятие. Вызывает lesson-service.
        ИДЕМПОТЕНТНО по lesson_id: повторный вызов возвращает существующую операцию,
        второй charge не создаётся (unique(lesson_id)).
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateChargeRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }
        "200": { description: "уже существует (идемпотентный повтор)", content: { application/json: { schema: { $ref: "#/components/schemas/Transaction" } } } }

  /internal/students/{studentId}/balance:
    get:
      summary: Баланс/долг ученика
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Balance" } } } }

  /internal/students/{studentId}/transactions:
    get:
      summary: Операции по ученику
      parameters: [ { $ref: "#/components/parameters/StudentId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Transaction" } } } } }

  /internal/payment-receipts:
    post:
      summary: >
        Зарегистрировать загруженный чек (student). Создаёт payment_receipt
        в статусе pending_review. БАЛАНС НЕ МЕНЯЕТСЯ.
      parameters: [ { $ref: "#/components/parameters/XUserId" } ]
      requestBody: { required: true, content: { application/json: { schema: { $ref: "#/components/schemas/CreateReceiptRequest" } } } }
      responses:
        "201": { description: created, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }
    get:
      summary: Список чеков (teacher — на проверку)
      parameters: [ { $ref: "#/components/parameters/XUserId" }, { name: status, in: query, required: false, schema: { type: string, enum: [pending_review, confirmed, rejected] } } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/Receipt" } } } } }

  /internal/payment-receipts/{receiptId}/confirm:
    post:
      summary: >
        Подтвердить чек (teacher). ИДЕМПОТЕНТНО: повторное подтверждение не создаёт
        второй payment. Создаёт операцию type=payment, amount=receipt.amount. Баланс меняется.
      parameters: [ { $ref: "#/components/parameters/ReceiptId" }, { $ref: "#/components/parameters/XUserId" } ]
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }
        "409": { $ref: "#/components/responses/Error" }

  /internal/payment-receipts/{receiptId}/reject:
    post:
      summary: Отклонить чек (teacher). Баланс не меняется.
      parameters: [ { $ref: "#/components/parameters/ReceiptId" }, { $ref: "#/components/parameters/XUserId" } ]
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/RejectRequest" } } } }
      responses:
        "200": { description: ok, content: { application/json: { schema: { $ref: "#/components/schemas/Receipt" } } } }

components:
  parameters:
    XUserId: { name: X-User-Id, in: header, required: true, schema: { type: string, format: uuid } }
    StudentId: { name: studentId, in: path, required: true, schema: { type: string, format: uuid } }
    ReceiptId: { name: receiptId, in: path, required: true, schema: { type: string, format: uuid } }
  responses:
    Health:
      description: ok
      content: { application/json: { schema: { type: object, properties: { status: { type: string, example: ok } } } } }
    Error:
      description: единый формат ошибки
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Error:
      type: object
      properties:
        error: { type: object, properties: { code: { type: string }, message: { type: string }, details: { type: object, additionalProperties: true } } }
    CreateChargeRequest:
      type: object
      required: [teacher_id, student_id, lesson_id, amount]
      properties:
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        lesson_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string, default: RUB }
        comment: { type: string }
    Transaction:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        type: { type: string, enum: [charge, payment, correction, refund] }
        amount: { type: number }
        currency: { type: string }
        lesson_id: { type: string, format: uuid, nullable: true }
        receipt_id: { type: string, format: uuid, nullable: true }
        comment: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
    Balance:
      type: object
      properties:
        student_id: { type: string, format: uuid }
        currency: { type: string, example: RUB }
        balance: { type: number, description: "balance = sum(charge) - sum(payment) + sum(correction) - sum(refund); >0 = долг ученика" }
    CreateReceiptRequest:
      # student_id берётся из X-User-Id (аутентифицированный ученик), НЕ из тела.
      type: object
      required: [teacher_id, file_id, amount]
      properties:
        teacher_id: { type: string, format: uuid }
        file_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string, default: RUB }
        comment: { type: string }
    Receipt:
      type: object
      properties:
        id: { type: string, format: uuid }
        teacher_id: { type: string, format: uuid }
        student_id: { type: string, format: uuid }
        file_id: { type: string, format: uuid }
        amount: { type: number }
        currency: { type: string }
        status: { type: string, enum: [pending_review, confirmed, rejected] }
        submitted_at: { type: string, format: date-time }
        reviewed_at: { type: string, format: date-time, nullable: true }
        reviewed_by: { type: string, format: uuid, nullable: true }
        comment: { type: string, nullable: true }
    RejectRequest:
      type: object
      properties:
        comment: { type: string }
