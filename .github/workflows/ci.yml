name: CI

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  workflows:
    name: GitHub Actions validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run actionlint
        run: |
          docker run --rm \
            --volume "$PWD:/repo:ro" \
            --workdir /repo \
            rhysd/actionlint:1.7.7@sha256:887a259a5a534f3c4f36cb02dca341673c6089431057242cdc931e9f133147e9

  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  python-tests:
    name: Pytest collection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -r requirements-dev.txt
      - run: python -m pytest --collect-only -q tests

  compose:
    name: Production compose config
    runs-on: ubuntu-latest
    env:
      TUTORFLOW_DOMAIN: netwatch-arsen-demo.ru
      CADDY_EMAIL: admin@netwatch-arsen-demo.ru
      TUTORFLOW_IMAGE_NAMESPACE: ghcr.io/arthast
      IMAGE_TAG: ci
      POSTGRES_USER: tutorflow
      POSTGRES_PASSWORD: ci_postgres_password
      JWT_SECRET: ci_jwt_secret_ci_jwt_secret_ci_jwt_secret
      MINIO_ROOT_USER: tutorflow
      MINIO_ROOT_PASSWORD: ci_minio_password
      GATEWAY_CORS_ORIGIN: https://netwatch-arsen-demo.ru
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose
        env:
          GRAFANA_ADMIN_USER: ci-admin
          GRAFANA_ADMIN_PASSWORD: ci-only-not-a-production-secret
        run: |
          docker compose \
            --project-directory . \
            -f deploy/compose/production.yml \
            config >/tmp/tutorflow-prod.yml
          docker compose \
            --project-directory . \
            -f deploy/compose/production.yml \
            -f deploy/compose/production.local-build.yml \
            config >/tmp/tutorflow-prod-local-build.yml
          docker compose \
            --project-directory . \
            -f docker-compose.yml \
            -f deploy/compose/local.kafka-cluster.yml \
            config >/tmp/tutorflow-local-kafka-cluster.yml
      - name: Validate production logging configuration
        run: |
          docker run --rm \
            -v "$PWD/deploy/observability/loki.yml:/etc/loki/config.yml:ro" \
            grafana/loki:3.7.3 \
            -config.file=/etc/loki/config.yml \
            -verify-config
          docker run --rm \
            -v "$PWD/deploy/observability/alloy/config.alloy:/etc/alloy/config.alloy:ro" \
            grafana/alloy:v1.18.0 \
            validate /etc/alloy/config.alloy
          jq empty deploy/observability/grafana/dashboards/tutorflow-logs.json
      - name: Validate Grafana provisioning through API
        run: |
          grafana_container=tutorflow-grafana-provision-test
          grafana_user=ci-admin
          grafana_password=ci-only-provision-test-password

          cleanup() {
            exit_status=$?
            trap - EXIT
            if ((exit_status != 0)); then
              docker logs "$grafana_container" >&2 || true
            fi
            docker rm -f "$grafana_container" >/dev/null 2>&1 || true
            exit "$exit_status"
          }
          trap cleanup EXIT

          docker rm -f "$grafana_container" >/dev/null 2>&1 || true
          docker run -d \
            --name "$grafana_container" \
            --publish 127.0.0.1:33000:3000 \
            --env GF_SECURITY_ADMIN_USER="$grafana_user" \
            --env GF_SECURITY_ADMIN_PASSWORD="$grafana_password" \
            --env GF_USERS_ALLOW_SIGN_UP=false \
            --env GF_PLUGINS_PREINSTALL_DISABLED=true \
            --volume "$PWD/deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro" \
            --volume "$PWD/deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro" \
            grafana/grafana:13.0.2 >/dev/null

          ready=0
          for attempt in $(seq 1 12); do
            if curl --fail --silent --show-error \
              --connect-timeout 2 \
              --max-time 5 \
              http://127.0.0.1:33000/api/health >/dev/null; then
              ready=1
              break
            fi
            if ((attempt < 12)); then
              sleep 5
            fi
          done
          if ((ready == 0)); then
            echo "Grafana did not become ready" >&2
            exit 1
          fi

          curl --fail --silent --show-error \
            --connect-timeout 2 \
            --max-time 5 \
            --user "$grafana_user:$grafana_password" \
            http://127.0.0.1:33000/api/datasources/uid/tutorflow-loki |
            jq -e '.uid == "tutorflow-loki"'
          curl --fail --silent --show-error \
            --connect-timeout 2 \
            --max-time 5 \
            --user "$grafana_user:$grafana_password" \
            http://127.0.0.1:33000/api/dashboards/uid/tutorflow-logs |
            jq -e '.dashboard.uid == "tutorflow-logs"'
          curl --fail --silent --show-error \
            --connect-timeout 2 \
            --max-time 5 \
            --user "$grafana_user:$grafana_password" \
            http://127.0.0.1:33000/api/v1/provisioning/alert-rules/tutorflow-log-error-burst |
            jq -e '.uid == "tutorflow-log-error-burst"'
          curl --fail --silent --show-error \
            --connect-timeout 2 \
            --max-time 5 \
            --user "$grafana_user:$grafana_password" \
            http://127.0.0.1:33000/api/v1/provisioning/alert-rules/tutorflow-logging-stack-down |
            jq -e '.uid == "tutorflow-logging-stack-down"'

          if docker logs "$grafana_container" 2>&1 |
            grep -Ei 'provisioning.*level=error|level=error.*provisioning'; then
            echo "Grafana reported provisioning failures" >&2
            exit 1
          fi
