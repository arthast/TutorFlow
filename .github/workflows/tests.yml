name: Manual Tests

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: manual-tests-${{ github.ref }}
  cancel-in-progress: false

jobs:
  full-stack:
    name: C++ unit and full-stack integration tests
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      COMPOSE_PROJECT_NAME: tutorflow-ci-${{ github.run_id }}
      GATEWAY_URL: http://localhost:8080
      REALTIME_URL: ws://localhost:8089/ws
      REALTIME_REPLICA_URL: ws://localhost:8090/ws
    steps:
      - uses: actions/checkout@v4

      - name: Prepare test environment
        run: cp .env.example .env

      - name: Record tested commit
        shell: bash
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$GITHUB_SHA"
          {
            echo "## Manual test target"
            echo
            echo "- Ref: \`$GITHUB_REF\`"
            echo "- Commit: \`$actual_sha\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install Python test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Run C++ unit tests
        shell: bash
        run: |
          set -euo pipefail
          userver_image="$(sed -n 's/^ARG USERVER_IMAGE=//p' docker/service.Dockerfile)"
          test -n "$userver_image"
          docker run --rm \
            --volume "$GITHUB_WORKSPACE:/src:ro" \
            "$userver_image" \
            bash -ec '
              cmake -S /src -B /tmp/tutorflow-build -DCMAKE_BUILD_TYPE=Release
              cmake --build /tmp/tutorflow-build \
                --target tutorflow-events-unit-tests chat-sharding-unit-tests \
                -j 2
              ctest --test-dir /tmp/tutorflow-build --output-on-failure -j 2
            '

      - name: Start full application stack
        shell: bash
        run: |
          set -euo pipefail
          COMPOSE_PARALLEL_LIMIT=2 docker compose up -d --build

      - name: Wait for gateway readiness
        shell: bash
        run: |
          set -euo pipefail
          for attempt in $(seq 1 120); do
            if curl --fail --silent --show-error "$GATEWAY_URL/health" >/dev/null; then
              exit 0
            fi
            echo "gateway is not ready yet ($attempt/120)"
            sleep 5
          done
          docker compose ps --all
          exit 1

      - name: Run gateway-facing pytest suite
        run: python -m pytest -q tests

      - name: Run MVP smoke path
        run: python scripts/smoke_mvp.py

      - name: Capture Compose diagnostics
        if: failure()
        shell: bash
        run: |
          mkdir -p artifacts
          docker compose ps --all > artifacts/compose-ps.txt 2>&1 || true
          docker compose logs --no-color > artifacts/compose.log 2>&1 || true

      - name: Upload failure diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: compose-diagnostics-${{ github.run_id }}
          path: artifacts/
          if-no-files-found: ignore
          retention-days: 14

      - name: Stop application stack
        if: always()
        run: docker compose down -v --remove-orphans
