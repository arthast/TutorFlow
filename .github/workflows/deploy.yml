name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy. Empty means current commit SHA."
        required: false
        default: ""

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/arthast
  PROD_DOMAIN: netwatch-arsen-demo.ru

jobs:
  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tutorflow-frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              VITE_API_URL=https://netwatch-arsen-demo.ru
              VITE_REALTIME_URL=wss://netwatch-arsen-demo.ru/ws
          - image: tutorflow-api-gateway
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=api-gateway
              BUILD_JOBS=2
          - image: tutorflow-identity-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=identity-service
              BUILD_JOBS=2
          - image: tutorflow-lesson-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=lesson-service
              BUILD_JOBS=2
          - image: tutorflow-assignment-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=assignment-service
              BUILD_JOBS=2
          - image: tutorflow-finance-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=finance-service
              BUILD_JOBS=2
          - image: tutorflow-file-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=file-service
              BUILD_JOBS=2
          - image: tutorflow-notification-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=notification-service
              BUILD_JOBS=2
          - image: tutorflow-report-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=report-service
              BUILD_JOBS=2
          - image: tutorflow-chat-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=chat-service
              BUILD_JOBS=2
          - image: tutorflow-realtime-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=realtime-service
              BUILD_JOBS=2
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ github.sha }}
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload deploy bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          tar -czf /tmp/tutorflow-deploy-bundle.tgz \
            docker-compose.prod.yml \
            deploy \
            migrations \
            docker/postgres
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'sudo mkdir -p /opt/tutorflow && sudo chown "$USER:$USER" /opt/tutorflow'
          scp -i ~/.ssh/deploy_key /tmp/tutorflow-deploy-bundle.tgz \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/tutorflow-deploy-bundle.tgz"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd /opt/tutorflow && tar -xzf /tmp/tutorflow-deploy-bundle.tgz'
      - name: Compose pull and up
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
          IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
        run: |
          IMAGE_TAG="${IMAGE_TAG_INPUT:-${GITHUB_SHA}}"
          printf '%s' "$GHCR_PASSWORD" | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && test -f .env && \
             for attempt in 1 2 3; do \
               COMPOSE_PARALLEL_LIMIT=2 IMAGE_TAG='$IMAGE_TAG' TUTORFLOW_IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' docker compose --env-file .env -f docker-compose.prod.yml pull && exit 0; \
               echo \"compose pull failed, retry \$attempt/3\"; \
               sleep 20; \
             done; \
             exit 1"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && COMPOSE_PARALLEL_LIMIT=2 IMAGE_TAG='$IMAGE_TAG' TUTORFLOW_IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' docker compose --env-file .env -f docker-compose.prod.yml up -d --remove-orphans"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && docker compose --env-file .env -f docker-compose.prod.yml ps && docker image prune -f"
