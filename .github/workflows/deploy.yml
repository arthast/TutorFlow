name: Deploy

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Full 40-character commit SHA that passed Manual Tests"
        required: true
        type: string

permissions:
  actions: read
  contents: read
  packages: write

env:
  IMAGE_NAMESPACE: ghcr.io/arthast
  PROD_DOMAIN: netwatch-arsen-demo.ru

jobs:
  validate:
    name: Validate tested commit
    runs-on: ubuntu-latest
    outputs:
      commit_sha: ${{ steps.input.outputs.commit_sha }}
    steps:
      - name: Validate commit SHA input
        id: input
        shell: bash
        env:
          COMMIT_SHA_INPUT: ${{ inputs.commit_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$COMMIT_SHA_INPUT" =~ ^[0-9a-fA-F]{40}$ ]]; then
            echo "commit_sha must be a full 40-character hexadecimal SHA" >&2
            exit 1
          fi
          commit_sha="$(printf '%s' "$COMMIT_SHA_INPUT" | tr '[:upper:]' '[:lower:]')"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.input.outputs.commit_sha }}
          fetch-depth: 1

      - name: Verify checked-out commit
        shell: bash
        env:
          EXPECTED_SHA: ${{ steps.input.outputs.commit_sha }}
        run: |
          set -euo pipefail
          actual_sha="$(git rev-parse HEAD)"
          test "$actual_sha" = "$EXPECTED_SHA"

      - name: Require successful Manual Tests run
        uses: actions/github-script@v7
        env:
          COMMIT_SHA: ${{ steps.input.outputs.commit_sha }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const commitSha = process.env.COMMIT_SHA;
            const { data } = await github.rest.actions.listWorkflowRuns({
              owner,
              repo,
              workflow_id: 'tests.yml',
              event: 'workflow_dispatch',
              status: 'completed',
              head_sha: commitSha,
              per_page: 100,
            });
            const successfulRun = data.workflow_runs.find(
              (run) => run.head_sha.toLowerCase() === commitSha
                && run.conclusion === 'success',
            );
            if (!successfulRun) {
              core.setFailed(
                `Commit ${commitSha} has no successful Manual Tests run. `
                + 'Run the Manual Tests workflow for this exact commit first.',
              );
              return;
            }
            await core.summary
              .addHeading('Deployment test gate')
              .addRaw(`Commit \`${commitSha}\` passed Manual Tests.\n\n`)
              .addLink(`Workflow run #${successfulRun.run_number}`, successfulRun.html_url)
              .write();

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: tutorflow-frontend
            dockerfile: frontend/Dockerfile
            build_args: |
              VITE_API_URL=https://netwatch-arsen-demo.ru
              VITE_REALTIME_URL=wss://netwatch-arsen-demo.ru/ws
          - image: tutorflow-api-gateway
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=api-gateway
              BUILD_JOBS=2
          - image: tutorflow-identity-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=identity-service
              BUILD_JOBS=2
          - image: tutorflow-lesson-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=lesson-service
              BUILD_JOBS=2
          - image: tutorflow-assignment-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=assignment-service
              BUILD_JOBS=2
          - image: tutorflow-finance-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=finance-service
              BUILD_JOBS=2
          - image: tutorflow-file-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=file-service
              BUILD_JOBS=2
          - image: tutorflow-notification-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=notification-service
              BUILD_JOBS=2
          - image: tutorflow-report-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=report-service
              BUILD_JOBS=2
          - image: tutorflow-chat-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=chat-service
              BUILD_JOBS=2
          - image: tutorflow-realtime-service
            dockerfile: docker/service.Dockerfile
            build_args: |
              SERVICE=realtime-service
              BUILD_JOBS=2
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.commit_sha }}
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || github.token }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          build-args: ${{ matrix.build_args }}
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/${{ matrix.image }}:${{ needs.validate.outputs.commit_sha }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs:
      - validate
      - build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.commit_sha }}
      - name: Prepare SSH
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts
      - name: Upload deploy bundle
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          tar -czf /tmp/tutorflow-deploy-bundle.tgz \
            deploy \
            migrations \
            docker/postgres
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'sudo mkdir -p /opt/tutorflow && sudo chown "$USER:$USER" /opt/tutorflow'
          scp -i ~/.ssh/deploy_key /tmp/tutorflow-deploy-bundle.tgz \
            "$DEPLOY_USER@$DEPLOY_HOST:/tmp/tutorflow-deploy-bundle.tgz"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            'cd /opt/tutorflow && tar -xzf /tmp/tutorflow-deploy-bundle.tgz'
      - name: Remember currently running release
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && \
             test -x deploy/scripts/retain-images.sh && \
             deploy/scripts/retain-images.sh remember \
               --namespace '${IMAGE_NAMESPACE}' \
               --state-file /opt/tutorflow/.image-retention-state"
      - name: Compose pull and up
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          GHCR_PASSWORD: ${{ secrets.GHCR_TOKEN || github.token }}
          IMAGE_TAG: ${{ needs.validate.outputs.commit_sha }}
        run: |
          printf '%s' "$GHCR_PASSWORD" | ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "docker login ghcr.io -u '${{ github.actor }}' --password-stdin"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && \
             test -f .env && \
             grep -Eq '^GRAFANA_ADMIN_USER=.+$' .env && \
             grep -Eq '^GRAFANA_ADMIN_PASSWORD=.+$' .env && \
             ! grep -Eq '^GRAFANA_ADMIN_PASSWORD=change_me_' .env && \
             for attempt in 1 2 3; do \
               COMPOSE_PARALLEL_LIMIT=2 IMAGE_TAG='$IMAGE_TAG' TUTORFLOW_IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' docker compose --project-directory . --env-file .env -f deploy/compose/production.yml pull && exit 0; \
               echo \"compose pull failed, retry \$attempt/3\"; \
               sleep 20; \
             done; \
             exit 1"
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && COMPOSE_PARALLEL_LIMIT=2 IMAGE_TAG='$IMAGE_TAG' TUTORFLOW_IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' docker compose --project-directory . --env-file .env -f deploy/compose/production.yml up -d --remove-orphans"
      - name: Verify public production health
        run: |
          curl --fail --show-error --silent \
            --retry 18 \
            --retry-delay 10 \
            --retry-all-errors \
            "https://${PROD_DOMAIN}/health" >/dev/null
      - name: Verify production logging stack
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && \
             docker compose --project-directory . --env-file .env \
               -f deploy/compose/production.yml \
               exec -T prometheus wget -qO- http://loki:3100/ready && \
             docker compose --project-directory . --env-file .env \
               -f deploy/compose/production.yml \
               exec -T prometheus wget -qO- http://alloy:12345/-/ready"
      - name: Retain current and previous image releases
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          IMAGE_TAG: ${{ needs.validate.outputs.commit_sha }}
        run: |
          ssh -i ~/.ssh/deploy_key "$DEPLOY_USER@$DEPLOY_HOST" \
            "cd /opt/tutorflow && \
             deploy/scripts/retain-images.sh prune \
               --namespace '${IMAGE_NAMESPACE}' \
               --current-tag '$IMAGE_TAG' \
               --state-file /opt/tutorflow/.image-retention-state && \
             IMAGE_TAG='$IMAGE_TAG' TUTORFLOW_IMAGE_NAMESPACE='${IMAGE_NAMESPACE}' docker compose --project-directory . --env-file .env -f deploy/compose/production.yml ps && \
             docker system df"
