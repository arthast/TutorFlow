apiVersion: v1
kind: Service
metadata:
  name: assignment-service
spec:
  selector: {app.kubernetes.io/name: assignment-service}
  ports:
    - {name: http, port: 8083, targetPort: http}
    - {name: grpc, port: 9083, targetPort: grpc}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-service
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: assignment-service}
  template:
    metadata:
      labels: {app.kubernetes.io/name: assignment-service, app.kubernetes.io/part-of: tutorflow}
    spec:
      containers:
        - name: assignment-service
          image: ghcr.io/arthast/tutorflow-assignment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8083}
            - {name: grpc, containerPort: 9083}
          env:
            - name: ASSIGNMENT_DATABASE_URL
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: ASSIGNMENT_DATABASE_URL}}
            - name: ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS
              valueFrom: {configMapKeyRef: {name: tutorflow-config, key: ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS}}
            - name: KAFKA_SECDIST_CONFIG
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: KAFKA_SECDIST_CONFIG}}
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 36
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}

