apiVersion: v1
kind: Service
metadata:
  name: frontend
spec:
  selector: {app.kubernetes.io/name: frontend}
  ports:
    - {name: http, port: 80, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: frontend}
  template:
    metadata:
      labels: {app.kubernetes.io/name: frontend, app.kubernetes.io/part-of: tutorflow}
    spec:
      containers:
        - name: frontend
          image: ghcr.io/arthast/tutorflow-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 80}
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 2
            failureThreshold: 30
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
          readinessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
          resources:
            requests: {cpu: 25m, memory: 32Mi}
            limits: {cpu: 200m, memory: 128Mi}

