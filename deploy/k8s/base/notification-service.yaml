apiVersion: v1
kind: Service
metadata:
  name: notification-service
spec:
  clusterIP: None
  selector: {app.kubernetes.io/name: notification-service}
  ports:
    - {name: http, port: 8086, targetPort: http}
    - {name: grpc, port: 9086, targetPort: grpc}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
spec:
  replicas: 2
  selector:
    matchLabels: {app.kubernetes.io/name: notification-service}
  template:
    metadata:
      labels: {app.kubernetes.io/name: notification-service, app.kubernetes.io/part-of: tutorflow}
    spec:
      containers:
        - name: notification-service
          image: ghcr.io/arthast/tutorflow-notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8086}
            - {name: grpc, containerPort: 9086}
          env:
            - name: NOTIFICATION_DATABASE_URL
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: NOTIFICATION_DATABASE_URL}}
            - name: KAFKA_SECDIST_CONFIG
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: KAFKA_SECDIST_CONFIG}}
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 36
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}

