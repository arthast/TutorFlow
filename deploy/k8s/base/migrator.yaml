apiVersion: batch/v1
kind: Job
metadata:
  name: migrator
spec:
  backoffLimit: 6
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrator
        app.kubernetes.io/part-of: tutorflow
    spec:
      restartPolicy: OnFailure
      initContainers:
        - name: wait-for-postgres
          image: postgres:16-alpine
          command:
            - sh
            - -ec
            - until pg_isready -h postgres -U "$POSTGRES_USER"; do sleep 2; done
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: tutorflow-config
                  key: POSTGRES_USER
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
      containers:
        - name: migrator
          image: postgres:16-alpine
          imagePullPolicy: IfNotPresent
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: tutorflow-config
                  key: POSTGRES_USER
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: tutorflow-secrets
                  key: POSTGRES_PASSWORD
          command:
            - sh
            - -ec
            - |
              for svc_db in identity:identity_db lesson:lesson_db assignment:assignment_db finance:finance_db file:file_db notification:notification_db report:report_db chat:chat_db_shard0 chat:chat_db_shard1; do
                svc="${svc_db%%:*}"
                db="${svc_db##*:}"
                createdb -h postgres -U "$POSTGRES_USER" "$db" 2>/dev/null || true
                for migration in $(find -L "/migrations/$svc" -maxdepth 1 -type f -name '*.sql' | sort); do
                  echo "== applying $svc/$(basename "$migration") -> $db"
                  psql -v ON_ERROR_STOP=1 -h postgres -U "$POSTGRES_USER" -d "$db" -f "$migration"
                done
              done
              echo "migrations done."
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
          volumeMounts:
            - {name: identity-migrations, mountPath: /migrations/identity, readOnly: true}
            - {name: lesson-migrations, mountPath: /migrations/lesson, readOnly: true}
            - {name: assignment-migrations, mountPath: /migrations/assignment, readOnly: true}
            - {name: finance-migrations, mountPath: /migrations/finance, readOnly: true}
            - {name: file-migrations, mountPath: /migrations/file, readOnly: true}
            - {name: notification-migrations, mountPath: /migrations/notification, readOnly: true}
            - {name: report-migrations, mountPath: /migrations/report, readOnly: true}
            - {name: chat-migrations, mountPath: /migrations/chat, readOnly: true}
      volumes:
        - name: identity-migrations
          configMap: {name: migrations-identity}
        - name: lesson-migrations
          configMap: {name: migrations-lesson}
        - name: assignment-migrations
          configMap: {name: migrations-assignment}
        - name: finance-migrations
          configMap: {name: migrations-finance}
        - name: file-migrations
          configMap: {name: migrations-file}
        - name: notification-migrations
          configMap: {name: migrations-notification}
        - name: report-migrations
          configMap: {name: migrations-report}
        - name: chat-migrations
          configMap: {name: migrations-chat}
