apiVersion: v1
kind: Service
metadata:
  name: report-service
spec:
  selector: {app.kubernetes.io/name: report-service}
  ports:
    - {name: http, port: 8087, targetPort: http}
    - {name: grpc, port: 9087, targetPort: grpc}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: report-service
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: report-service}
  template:
    metadata:
      labels: {app.kubernetes.io/name: report-service, app.kubernetes.io/part-of: tutorflow}
    spec:
      containers:
        - name: report-service
          image: ghcr.io/arthast/tutorflow-report-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8087}
            - {name: grpc, containerPort: 9087}
          env:
            - name: REPORT_DATABASE_URL
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: REPORT_DATABASE_URL}}
            - name: KAFKA_SECDIST_CONFIG
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: KAFKA_SECDIST_CONFIG}}
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 36
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}

