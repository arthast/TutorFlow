apiVersion: v1
kind: Service
metadata:
  name: file-service
spec:
  selector: {app.kubernetes.io/name: file-service}
  ports:
    - {name: http, port: 8085, targetPort: http}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: file-service
spec:
  replicas: 1
  selector:
    matchLabels: {app.kubernetes.io/name: file-service}
  template:
    metadata:
      labels: {app.kubernetes.io/name: file-service, app.kubernetes.io/part-of: tutorflow}
    spec:
      initContainers:
        - name: minio-init
          image: minio/minio:RELEASE.2025-04-22T22-12-26Z
          command: ["/bin/sh", "-ec"]
          args:
            - >-
              until mc alias set tutorflow
              http://minio.tutorflow.svc.cluster.local:9000
              "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"; do sleep 2; done;
              mc mb --ignore-existing "tutorflow/$FILE_S3_BUCKET"
          env:
            - name: MINIO_ROOT_USER
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: MINIO_ROOT_USER}}
            - name: MINIO_ROOT_PASSWORD
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: MINIO_ROOT_PASSWORD}}
            - name: FILE_S3_BUCKET
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: FILE_S3_BUCKET}}
      containers:
        - name: file-service
          image: ghcr.io/arthast/tutorflow-file-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - {name: http, containerPort: 8085}
          env:
            - name: FILE_DATABASE_URL
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: FILE_DATABASE_URL}}
            - name: FILE_STORAGE_BACKEND
              valueFrom: {configMapKeyRef: {name: tutorflow-config, key: FILE_STORAGE_BACKEND}}
            - name: FILE_STORAGE_DIR
              valueFrom: {configMapKeyRef: {name: tutorflow-config, key: FILE_STORAGE_DIR}}
            - name: FILE_MAX_SIZE_BYTES
              valueFrom: {configMapKeyRef: {name: tutorflow-config, key: FILE_MAX_SIZE_BYTES}}
            - name: FILE_SECDIST_CONFIG
              valueFrom: {secretKeyRef: {name: tutorflow-secrets, key: FILE_SECDIST_CONFIG}}
          startupProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 36
          livenessProbe:
            httpGet: {path: /health, port: http}
            periodSeconds: 10
            timeoutSeconds: 2
            failureThreshold: 3
          readinessProbe:
            httpGet: {path: /ready, port: http}
            periodSeconds: 5
            timeoutSeconds: 2
            failureThreshold: 3
          resources:
            requests: {cpu: 100m, memory: 128Mi}
            limits: {cpu: 500m, memory: 512Mi}
