name: tutorflow-prod

x-production-logging: &production-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-image-prefix: &image-prefix ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}
x-image-tag: &image-tag ${IMAGE_TAG:-latest}
x-kafka-secdist-config: &kafka-secdist-config >-
  {"kafka_settings":{"kafka-producer":{"brokers":"${KAFKA_BROKERS:-kafka:9092}"},"kafka-consumer":{"brokers":"${KAFKA_BROKERS:-kafka:9092}"}}}
x-realtime-secdist-config: &realtime-secdist-config >-
  {"kafka_settings":{"kafka-consumer":{"brokers":"${KAFKA_BROKERS:-kafka:9092}"}},"redis_settings":{"realtime-redis":{"password":"${REDIS_PASSWORD:-}","sentinels":[{"host":"${REDIS_HOST:-redis}","port":${REDIS_PORT:-6379}}],"shards":[{"name":"realtime-master"}]}}}

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    logging: *production-logging
    environment:
      TUTORFLOW_DOMAIN: ${TUTORFLOW_DOMAIN:-netwatch-arsen-demo.ru}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@netwatch-arsen-demo.ru}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - api-gateway
      - realtime-service
    networks: [tutorflow]

  frontend:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    networks: [tutorflow]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    logging: *production-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USER}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tutorflow]

  migrator:
    image: postgres:16-alpine
    restart: "no"
    logging: *production-logging
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for svc_db in identity:identity_db lesson:lesson_db assignment:assignment_db finance:finance_db file:file_db notification:notification_db report:report_db chat:chat_db_shard0 chat:chat_db_shard1; do
          svc="$${svc_db%%:*}"; db="$${svc_db##*:}"
          createdb -h postgres -U "$$POSTGRES_USER" "$$db" 2>/dev/null || true
          for f in $$(ls /migrations/"$$svc"/*.sql 2>/dev/null | sort); do
            echo "== applying $$svc/$$(basename "$$f") -> $$db"
            psql -v ON_ERROR_STOP=1 -h postgres -U "$$POSTGRES_USER" -d "$$db" -f "$$f"
          done
        done
        echo "migrations done."
    depends_on:
      postgres:
        condition: service_healthy
    networks: [tutorflow]

  kafka:
    image: apache/kafka:3.8.1
    restart: unless-stopped
    logging: *production-logging
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: tutorflow-kafka-cluster-0
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks: [tutorflow]

  kafka-init:
    image: apache/kafka:3.8.1
    restart: "no"
    logging: *production-logging
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
      # Keep the single-broker default explicit and compatible with the shared
      # kafka-init contract used by the local scale overlay.
      KAFKA_TOPIC_MIN_INSYNC_REPLICAS: ${KAFKA_TOPIC_MIN_INSYNC_REPLICAS:-1}
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        topics="tutorflow.lesson.events tutorflow.assignment.events tutorflow.finance.events tutorflow.chat.events tutorflow.notification.events"
        for topic in $$topics; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions "$$KAFKA_TOPIC_PARTITIONS" \
            --replication-factor "$$KAFKA_TOPIC_REPLICATION_FACTOR" \
            --config "min.insync.replicas=$$KAFKA_TOPIC_MIN_INSYNC_REPLICAS"

          partitions=$$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --describe \
            --topic "$$topic" \
            | awk -F'PartitionCount: ' '/Topic:/ {split($$2, parts, " "); print parts[1]; exit}')
          replicas=$$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --describe \
            --topic "$$topic" \
            | awk -F'ReplicationFactor: ' '/Topic:/ {split($$2, parts, " "); print parts[1]; exit}')
          min_isr=$$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --describe \
            --topic "$$topic" \
            | grep -o 'min\.insync\.replicas=[0-9][0-9]*' \
            | head -n 1 \
            | cut -d= -f2)

          if [ "$$partitions" != "$$KAFKA_TOPIC_PARTITIONS" ] || [ "$$replicas" != "$$KAFKA_TOPIC_REPLICATION_FACTOR" ] || [ "$$min_isr" != "$$KAFKA_TOPIC_MIN_INSYNC_REPLICAS" ]; then
            echo "topic $$topic has partitions=$$partitions rf=$$replicas min_isr=$$min_isr, expected partitions=$$KAFKA_TOPIC_PARTITIONS rf=$$KAFKA_TOPIC_REPLICATION_FACTOR min_isr=$$KAFKA_TOPIC_MIN_INSYNC_REPLICAS" >&2
            exit 1
          fi
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$$KAFKA_BROKERS" --list
    networks: [tutorflow]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    logging: *production-logging
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tutorflow]

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    logging: *production-logging
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [tutorflow]

  minio-init:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: "no"
    logging: *production-logging
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - >-
        mc alias set tutorflow http://minio:9000
        "$${MINIO_ROOT_USER}" "$${MINIO_ROOT_PASSWORD}" &&
        mc mb --ignore-existing "tutorflow/$${FILE_S3_BUCKET}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      FILE_S3_BUCKET: ${FILE_S3_BUCKET:-tutorflow-files}
    depends_on:
      minio:
        condition: service_healthy
    networks: [tutorflow]

  api-gateway:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-api-gateway:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
      GATEWAY_CORS_ORIGIN: ${GATEWAY_CORS_ORIGIN:-https://netwatch-arsen-demo.ru}
      FILE_SERVICE_URL: http://file-service:8085
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      identity-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      assignment-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    networks: [tutorflow]

  identity-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-identity-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      IDENTITY_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/identity_db
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS:-86400}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  lesson-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-lesson-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      LESSON_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/lesson_db
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  assignment-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-assignment-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      ASSIGNMENT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/assignment_db
      ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS: ${ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS:-60000}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  finance-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-finance-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      FINANCE_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/finance_db
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  file-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-file-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      FILE_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/file_db
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-s3}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/data/files}
      FILE_MAX_SIZE_BYTES: ${FILE_MAX_SIZE_BYTES:-10485760}
      FILE_SECDIST_CONFIG: >-
        {"s3_file_storage":{"endpoint":"${FILE_S3_ENDPOINT:-http://minio:9000}","access_key":"${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}","secret_key":"${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}","bucket":"${FILE_S3_BUCKET:-tutorflow-files}","region":"${FILE_S3_REGION:-us-east-1}","addressing_style":"${FILE_S3_ADDRESSING_STYLE:-path}"}}
    volumes:
      - filestorage:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  notification-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-notification-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      NOTIFICATION_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/notification_db
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  report-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-report-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      REPORT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/report_db
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  chat-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-chat-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      CHAT_DATABASE_URL_SHARD0: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chat_db_shard0
      CHAT_DATABASE_URL_SHARD1: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/chat_db_shard1
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  realtime-service:
    image: ${TUTORFLOW_IMAGE_NAMESPACE:-ghcr.io/arthast}/tutorflow-realtime-service:${IMAGE_TAG:-latest}
    restart: unless-stopped
    logging: *production-logging
    environment:
      REALTIME_PORT: 8089
      JWT_SECRET: ${JWT_SECRET}
      REALTIME_SECDIST_CONFIG: *realtime-secdist-config
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  prometheus:
    image: prom/prometheus:v3.12.0
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=7d
      - --storage.tsdb.retention.size=2GB
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/ready >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s
    mem_limit: 512m
    cpus: "0.50"
    logging: *production-logging
    networks: [tutorflow]

  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    restart: unless-stopped
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy
    mem_limit: 128m
    cpus: "0.25"
    logging: *production-logging
    networks: [tutorflow]

  grafana:
    image: grafana/grafana:13.0.2
    restart: unless-stopped
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_PLUGINS_PREINSTALL_DISABLED: "true"
      GF_USERS_DEFAULT_THEME: light
    ports:
      - "127.0.0.1:${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    healthcheck:
      test: ["CMD-SHELL", "wget -T 3 -qO- http://localhost:3000/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    mem_limit: 512m
    cpus: "0.50"
    logging: *production-logging
    networks: [tutorflow]

networks:
  tutorflow:
    driver: bridge

volumes:
  pgdata:
  filestorage:
  kafkadata:
  miniodata:
  redisdata:
  caddy_data:
  caddy_config:
  prometheusdata:
  grafanadata:
