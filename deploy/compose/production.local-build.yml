# Optional override: build production application images from this checkout.
services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://netwatch-arsen-demo.ru}
        VITE_REALTIME_URL: ${VITE_REALTIME_URL:-wss://netwatch-arsen-demo.ru/ws}

  api-gateway:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: api-gateway
        BUILD_JOBS: ${BUILD_JOBS:-2}

  identity-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: identity-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  lesson-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: lesson-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  assignment-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: assignment-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  finance-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: finance-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  file-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: file-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  notification-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: notification-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  report-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: report-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  chat-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: chat-service
        BUILD_JOBS: ${BUILD_JOBS:-2}

  realtime-service:
    build:
      context: .
      dockerfile: docker/service.Dockerfile
      args:
        SERVICE: realtime-service
        BUILD_JOBS: ${BUILD_JOBS:-2}
