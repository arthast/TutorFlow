global:
  scrape_interval: 10s
  scrape_timeout: 5s

scrape_configs:
  - job_name: tutorflow-services
    metrics_path: /metrics
    static_configs:
      - targets: [api-gateway:18080]
        labels:
          service: api-gateway
      - targets: [identity-service:18081]
        labels:
          service: identity-service
      - targets: [lesson-service:18082]
        labels:
          service: lesson-service
      - targets: [assignment-service:18083]
        labels:
          service: assignment-service
      - targets: [finance-service:18084]
        labels:
          service: finance-service
      - targets: [file-service:18085]
        labels:
          service: file-service
      - targets: [notification-service:18086]
        labels:
          service: notification-service
      - targets: [report-service:18087]
        labels:
          service: report-service
      - targets: [chat-service:18088]
        labels:
          service: chat-service
      - targets: [realtime-service:18089]
        labels:
          service: realtime-service

  - job_name: kafka-exporter
    static_configs:
      - targets: [kafka-exporter:9308]
        labels:
          service: kafka-exporter
