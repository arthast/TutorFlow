# TutorFlow — dev-стек (PLAN §4, §12).
# Один контейнер postgres + 6 сервисов. Наружу публикуется ТОЛЬКО api-gateway.
# Все внутренние сервисы доступны лишь по docker-сети (по имени сервиса).
#
#   cp .env.example .env   # заполнить секреты
#   docker compose up --build
#   ./scripts/migrate.sh all
#   curl http://localhost:${GATEWAY_PORT:-8080}/health
name: tutorflow

x-userver-image: &userver-image ${USERVER_IMAGE:-ghcr.io/userver-framework/ubuntu-22.04-userver:latest}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # БД по умолчанию (per-service БД создаёт initdb-скрипт ниже).
      POSTGRES_DB: ${POSTGRES_USER}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tutorflow]
    # Порт наружу НЕ публикуем — только docker-сеть.

  # One-shot миграции (PLAN §11). Ждёт postgres healthy, применяет
  # migrations/<svc>/*.sql по возрастанию в соответствующие БД и завершается
  # (exit 0). Прикладные сервисы стартуют только после успешного завершения,
  # поэтому к моменту старта publisher/consumer таблицы уже есть.
  # Та же логика, что в scripts/migrate.sh (ручной прогон тоже остаётся валидным).
  migrator:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for svc_db in identity:identity_db lesson:lesson_db assignment:assignment_db finance:finance_db file:file_db; do
          svc="$${svc_db%%:*}"; db="$${svc_db##*:}"
          for f in $$(ls /migrations/"$$svc"/*.sql 2>/dev/null | sort); do
            echo "== applying $$svc/$$(basename "$$f") -> $$db"
            psql -v ON_ERROR_STOP=1 -h postgres -U "$$POSTGRES_USER" -d "$$db" -f "$$f"
          done
        done
        echo "migrations done."
    depends_on:
      postgres:
        condition: service_healthy
    networks: [tutorflow]

  # Kafka broker (Этап 5D). KRaft-режим (без zookeeper), одна нода
  # broker+controller. Внутренний listener kafka:9092, наружу НЕ публикуем.
  # lesson/finance зависят от kafka (depends_on healthy): lesson публикует
  # lesson.completed, finance консьюмит и создаёт charge (Этап 5E).
  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: tutorflow-kafka-cluster-0
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks: [tutorflow]

  # Опциональный dev-UI для Kafka. Стартует только под профилем:
  #   docker compose --profile kafka-ui up kafka-ui
  kafka-ui:
    image: kafbat/kafka-ui:latest
    profiles: ["kafka-ui"]
    environment:
      KAFKA_CLUSTERS_0_NAME: tutorflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [tutorflow]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      GATEWAY_CORS_ORIGIN: ${GATEWAY_CORS_ORIGIN:-http://localhost:5173}
      # Домены вызываются по gRPC (dns:/// в static_config); по HTTP gateway
      # ходит только в file-service (multipart upload/download).
      FILE_SERVICE_URL: http://file-service:8085
    ports:
      - "${GATEWAY_PORT:-8080}:8080"   # ЕДИНСТВЕННЫЙ публичный порт
    depends_on:
      - identity-service
      - lesson-service
      - assignment-service
      - finance-service
      - file-service
    networks: [tutorflow]

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks: [tutorflow]

  lesson-service:
    build:
      context: .
      dockerfile: services/lesson-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      LESSON_DATABASE_URL: ${LESSON_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks: [tutorflow]

  assignment-service:
    build:
      context: .
      dockerfile: services/assignment-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      ASSIGNMENT_DATABASE_URL: ${ASSIGNMENT_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks: [tutorflow]

  finance-service:
    build:
      context: .
      dockerfile: services/finance-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      FINANCE_DATABASE_URL: ${FINANCE_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    networks: [tutorflow]

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      FILE_DATABASE_URL: ${FILE_DATABASE_URL}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/data/files}
      FILE_MAX_SIZE_BYTES: ${FILE_MAX_SIZE_BYTES:-10485760}
    volumes:
      - filestorage:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks: [tutorflow]

networks:
  tutorflow:
    driver: bridge

volumes:
  pgdata:
  filestorage:
  kafkadata:
