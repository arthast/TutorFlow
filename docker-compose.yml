# TutorFlow — dev-стек (PLAN §4, §12).
# Один контейнер postgres + сервисы. Наружу публикуются api-gateway и
# realtime-service (осознанное исключение для stateful WebSocket).
# Все внутренние сервисы доступны лишь по docker-сети (по имени сервиса).
#
#   cp .env.example .env   # заполнить секреты
#   docker compose up --build
#   ./scripts/migrate.sh all
#   curl http://localhost:${GATEWAY_PORT:-8080}/health
name: tutorflow

x-userver-image: &userver-image ${USERVER_IMAGE:-ghcr.io/userver-framework/ubuntu-22.04-userver:latest}
x-kafka-secdist-config: &kafka-secdist-config >-
  {"kafka_settings":{"kafka-producer":{"brokers":"${KAFKA_BROKERS:-kafka:9092}"},"kafka-consumer":{"brokers":"${KAFKA_BROKERS:-kafka:9092}"}}}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      # БД по умолчанию (per-service БД создаёт initdb-скрипт ниже).
      POSTGRES_DB: ${POSTGRES_USER}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_USER}"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tutorflow]
    # Порт наружу НЕ публикуем — только docker-сеть.

  # One-shot миграции (PLAN §11). Ждёт postgres healthy, применяет
  # migrations/<svc>/*.sql по возрастанию в соответствующие БД и завершается
  # (exit 0). Прикладные сервисы стартуют только после успешного завершения,
  # поэтому к моменту старта publisher/consumer таблицы уже есть.
  # Та же логика, что в scripts/migrate.sh (ручной прогон тоже остаётся валидным).
  migrator:
    image: postgres:16-alpine
    restart: "no"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./migrations:/migrations:ro
    command:
      - sh
      - -ec
      - |
        for svc_db in identity:identity_db lesson:lesson_db assignment:assignment_db finance:finance_db file:file_db notification:notification_db report:report_db chat:chat_db; do
          svc="$${svc_db%%:*}"; db="$${svc_db##*:}"
          createdb -h postgres -U "$$POSTGRES_USER" "$$db" 2>/dev/null || true
          for f in $$(ls /migrations/"$$svc"/*.sql 2>/dev/null | sort); do
            echo "== applying $$svc/$$(basename "$$f") -> $$db"
            psql -v ON_ERROR_STOP=1 -h postgres -U "$$POSTGRES_USER" -d "$$db" -f "$$f"
          done
        done
        echo "migrations done."
    depends_on:
      postgres:
        condition: service_healthy
    networks: [tutorflow]

  # Kafka broker (Этап 5D). KRaft-режим (без zookeeper), одна нода
  # broker+controller. Внутренний listener kafka:9092, наружу НЕ публикуем.
  # lesson/finance зависят от kafka (depends_on healthy): lesson публикует
  # lesson.completed, finance консьюмит и создаёт charge (Этап 5E).
  kafka:
    image: apache/kafka:3.8.1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      CLUSTER_ID: tutorflow-kafka-cluster-0
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
    volumes:
      - kafkadata:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks: [tutorflow]

  # One-shot Kafka topic provisioning (Этап 8.3). Topics intentionally group
  # events by domain; concrete event type remains in the envelope.
  kafka-init:
    image: apache/kafka:3.8.1
    restart: "no"
    environment:
      KAFKA_BROKERS: ${KAFKA_BROKERS:-kafka:9092}
      KAFKA_TOPIC_PARTITIONS: ${KAFKA_TOPIC_PARTITIONS:-3}
      KAFKA_TOPIC_REPLICATION_FACTOR: ${KAFKA_TOPIC_REPLICATION_FACTOR:-1}
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-ec"]
    command:
      - |
        topics="tutorflow.lesson.events tutorflow.assignment.events tutorflow.finance.events tutorflow.chat.events tutorflow.notification.events"
        for topic in $$topics; do
          /opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --create \
            --if-not-exists \
            --topic "$$topic" \
            --partitions "$$KAFKA_TOPIC_PARTITIONS" \
            --replication-factor "$$KAFKA_TOPIC_REPLICATION_FACTOR"

          partitions=$$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --describe \
            --topic "$$topic" \
            | awk -F'PartitionCount: ' '/Topic:/ {split($$2, parts, " "); print parts[1]; exit}')
          replicas=$$(/opt/kafka/bin/kafka-topics.sh \
            --bootstrap-server "$$KAFKA_BROKERS" \
            --describe \
            --topic "$$topic" \
            | awk -F'ReplicationFactor: ' '/Topic:/ {split($$2, parts, " "); print parts[1]; exit}')

          if [ "$$partitions" != "$$KAFKA_TOPIC_PARTITIONS" ] || [ "$$replicas" != "$$KAFKA_TOPIC_REPLICATION_FACTOR" ]; then
            echo "topic $$topic has partitions=$$partitions rf=$$replicas, expected partitions=$$KAFKA_TOPIC_PARTITIONS rf=$$KAFKA_TOPIC_REPLICATION_FACTOR" >&2
            exit 1
          fi
        done
        /opt/kafka/bin/kafka-topics.sh --bootstrap-server "$$KAFKA_BROKERS" --list
    networks: [tutorflow]

  # Опциональный dev-UI для Kafka. Стартует только под профилем:
  #   docker compose --profile kafka-ui up kafka-ui
  kafka-ui:
    image: kafbat/kafka-ui:latest
    profiles: ["kafka-ui"]
    environment:
      KAFKA_CLUSTERS_0_NAME: tutorflow
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BROKERS:-kafka:9092}
      DYNAMIC_CONFIG_ENABLED: "true"
    ports:
      - "${KAFKA_UI_PORT:-8090}:8080"
    depends_on:
      kafka:
        condition: service_healthy
    networks: [tutorflow]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [tutorflow]

  # Object storage for file-service (Этап 5I). S3 API stays internal on the
  # docker network; file upload/download still goes through api-gateway ->
  # file-service over HTTP multipart.
  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-tutorflow}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-tutorflow_minio_password}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/live >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [tutorflow]

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
      GATEWAY_CORS_ORIGIN: ${GATEWAY_CORS_ORIGIN:-http://localhost:5173}
      # Домены вызываются по gRPC (dns:/// в static_config); по HTTP gateway
      # ходит только в file-service (multipart upload/download).
      FILE_SERVICE_URL: http://file-service:8085
    ports:
      - "${GATEWAY_PORT:-8080}:8080"   # публичный REST порт
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    depends_on:
      identity-service:
        condition: service_healthy
      lesson-service:
        condition: service_healthy
      assignment-service:
        condition: service_healthy
      finance-service:
        condition: service_healthy
      file-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
      chat-service:
        condition: service_healthy
      realtime-service:
        condition: service_healthy
    networks: [tutorflow]

  identity-service:
    build:
      context: .
      dockerfile: services/identity-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      IDENTITY_DATABASE_URL: ${IDENTITY_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_TTL_SECONDS: ${JWT_TTL_SECONDS}
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8081/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  lesson-service:
    build:
      context: .
      dockerfile: services/lesson-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      LESSON_DATABASE_URL: ${LESSON_DATABASE_URL}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8082/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  assignment-service:
    build:
      context: .
      dockerfile: services/assignment-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      ASSIGNMENT_DATABASE_URL: ${ASSIGNMENT_DATABASE_URL}
      # Интервал deadline-worker. Короткий в dev/тестах; в проде — 60000.
      ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS: ${ASSIGNMENT_DEADLINE_WORKER_PERIOD_MS:-2000}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8083/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  finance-service:
    build:
      context: .
      dockerfile: services/finance-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      FINANCE_DATABASE_URL: ${FINANCE_DATABASE_URL}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8084/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  file-service:
    build:
      context: .
      dockerfile: services/file-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        # Безопасный дефолт параллелизма компиляции (тяжёлые userver/C++ TU
        # при -j nproc на машине с ~8 ГБ RAM ловят OOM). Переопредели под
        # свою память: BUILD_JOBS=12 docker compose build.
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      FILE_DATABASE_URL: ${FILE_DATABASE_URL}
      FILE_STORAGE_BACKEND: ${FILE_STORAGE_BACKEND:-local}
      FILE_STORAGE_DIR: ${FILE_STORAGE_DIR:-/data/files}
      FILE_MAX_SIZE_BYTES: ${FILE_MAX_SIZE_BYTES:-10485760}
      FILE_SECDIST_CONFIG: >-
        {"s3_file_storage":{"endpoint":"${FILE_S3_ENDPOINT:-http://minio:9000}","access_key":"${MINIO_ROOT_USER:-tutorflow}","secret_key":"${MINIO_ROOT_PASSWORD:-tutorflow_minio_password}","bucket":"${FILE_S3_BUCKET:-tutorflow-files}","region":"${FILE_S3_REGION:-us-east-1}"}}
    volumes:
      - filestorage:/data/files
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8085/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  notification-service:
    build:
      context: .
      dockerfile: services/notification-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      NOTIFICATION_DATABASE_URL: ${NOTIFICATION_DATABASE_URL}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8086/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  report-service:
    build:
      context: .
      dockerfile: services/report-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      REPORT_DATABASE_URL: ${REPORT_DATABASE_URL}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8087/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  # chat-service (Этап 5J): личная переписка teacher<->student. Producer
  # событий message.sent/message.read (outbox). Наружу НЕ публикуется.
  chat-service:
    build:
      context: .
      dockerfile: services/chat-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      CHAT_DATABASE_URL: ${CHAT_DATABASE_URL}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    depends_on:
      postgres:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8088/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

  # realtime-service (Этап 5J-later): WebSocket push для чата и уведомлений.
  # Публичный порт 8089 — исключение из "наружу только gateway"; доменные
  # команды по-прежнему идут только через gateway REST.
  realtime-service:
    build:
      context: .
      dockerfile: services/realtime-service/Dockerfile
      args:
        USERVER_IMAGE: *userver-image
        BUILD_JOBS: ${BUILD_JOBS:-2}
    environment:
      REALTIME_PORT: ${REALTIME_PORT:-8089}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379}
      JWT_SECRET: ${JWT_SECRET}
      KAFKA_SECDIST_CONFIG: *kafka-secdist-config
    ports:
      - "${REALTIME_PORT:-8089}:8089"
    depends_on:
      redis:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8089/ready >/dev/null || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 10s
    networks: [tutorflow]

networks:
  tutorflow:
    driver: bridge

volumes:
  pgdata:
  filestorage:
  kafkadata:
  miniodata:
  redisdata:
